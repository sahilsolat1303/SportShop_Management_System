<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #00b4db, #0083b0);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 20px;
      padding: 40px 50px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 95%;
      max-width: 600px;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      color: #924fa4;
      margin-bottom: 25px;
    }

    form {
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 12px 10px;
      font-size: 15px;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }

    input:focus,
    select:focus {
      border-color: #00b4db;
      box-shadow: 0 0 5px rgba(0, 180, 219, 0.4);
    }

    input[type="submit"] {
      background: linear-gradient(90deg, #00b4db, #0083b0);
      color: #fff;
      border: none;
      border-radius: 25px;
      padding: 12px 25px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s ease;
      width: 100%;
      margin-top: 10px;
    }

    input[type="submit"]:hover {
      background: linear-gradient(90deg, #0083b0, #00b4db);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 131, 176, 0.4);
    }

    a {
      display: block;
      text-align: center;
      margin-top: 15px;
      text-decoration: none;
      color: #684789;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }
      td {
        display: block;
        width: 100%;
      }
      td:first-child {
        margin-bottom: 5px;
        font-weight: 600;
        color: #0083b0;
      }
    }
  </style>
</head>
<body>
    <h1>Add New Product</h1>
    </hr>
    <form method="Post" enctype="multipart/form-data">
        <table border="1">
            <tr><td>Enter Product Name </td>
            <td><input type="text" name = "product_name" required/></td></tr>
            <tr><td>Enter Price </td>
            <td><input type="number" name = "price" required/></td></tr>
            <tr><td>Enter Description </td>
            <td><input type="text" name = "description" required/></td></tr>
            <tr><td>Enter Image url</td>
            <td><input type="file" name = "image_url" required/></td></tr>
            <tr><td>Select Catagory </td>
            <td><select name="cid">
                {%for cat in cats%}
                <option value="{{cat[0]}}">{{cat[1]}}</option>
                {%endfor%}

            </select></td></tr>
            <tr><td><input type="submit" value="Add Product"/></td></tr>

        </table>
    </form>
</body>
</html>
