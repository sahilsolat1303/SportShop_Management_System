<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #00b4db, #0083b0);
      color: #333;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dashboard {
      background: #fff;
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 350px;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    h1 {
      color:black;
      font-size: 28px;
      margin-bottom: 10px;
    }

    h2 {
      color: #444;
      font-size: 20px;
      margin-bottom: 20px;
    }

    table { 
      width: 100%;
      border-collapse: collapse;
      border-radius: 0%;
    }

    td {
      padding: 10px 0;
    }

    button {
      background: linear-gradient(90deg, #00b4db, #0083b0);
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }

    button:hover {
      background: linear-gradient(90deg, #0083b0, #00b4db);
      transform: translateY(-3px);
      box-shadow: 0 4px 12px rgba(0, 131, 176, 0.4);
    }

    hr {
      border: none;
      height: 2px;
      background-color:#333;
      margin: 20px 0;
      border-radius: 2px;
    }

    @media (max-width: 500px) {
      .dashboard {
        width: 90%;
        padding: 30px;
      }
      button {
        font-size: 14px;
      }
    }
  </style>
</head>


<body>
      <center>
        <h1>Adim Dashborad</h1>
        <h2>Welcome {{session["username"]}} !!!</h2>
        <hr/>
        
        <table border="1">
            <tr><td><a href="/showcategory"><button>Category</button></a></td></tr>
            <tr><td><a href="/showproduct"><button>Products</button></a></td></tr>
            <tr><td><a href="/logout"><button>Logout</button></a></td></tr>
        </table>
       
    </center>
</body>
</html>
</body>
</html>
