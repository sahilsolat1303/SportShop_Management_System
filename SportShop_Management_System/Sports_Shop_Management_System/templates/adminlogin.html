<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('/static/Images/different-sport-balls_1048-2681.avif');
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .login-container {
      background-color: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      width: 350px;
      text-align: center;
    }

    h1 {
      color: #0984e3;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 10px;
      font-size: 16px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #0984e3;
    }

    input[type="submit"] {
      background-color: #0984e3;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    input[type="submit"]:hover {
      background-color: #74b9ff;
      transition: 0.3s;
    }

    hr {
      margin: 15px 0;
      border: 1px solid #eee;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h1>Admin Login</h1>
    <hr />
    <form method="post">
      <table>
        <tr>
          <td>Username</td>
          <td><input type="text" name="username" required /></td>
        </tr>
        <tr>
          <td>Password</td>
          <td><input type="password" name="pwd" required /></td>
        </tr>
        <tr>
          <td colspan="2"><input type="submit" value="Login" /></td>
        </tr>
      </table>
    </form>
  </div>
</body>
</html>
